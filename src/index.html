<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <meta content="ie=edge" http-equiv="X-UA-Compatible" />
    <title>Around The U.S.</title>
    <link href="../pages/index.css" rel="stylesheet" />
  </head>
  <body class="page">
    <div class="page__content">
      <header class="header page__section">
        <img
          alt="Logotipo Around The U.S."
          class="logo header__logo"
          src="../images/logo.svg"
        />
      </header>
      <main class="content">
        <section class="profile page__section">
          <div class="profile__image-container">
            <img
              class="profile__image"
              src="../images/avatar.jpg"
              alt="Avatar"
            />
            <div class="profile__image-overlay">
              <span class="profile__icon"></span>
            </div>
          </div>
          <div class="profile__info">
            <h1 class="profile__title"></h1>
            <button
              aria-label="Editar perfil"
              class="profile__edit-button"
              type="button"
            ></button>
            <p class="profile__description"></p>
          </div>
          <button
            aria-label="Adicionar cartão"
            class="profile__add-button"
            type="button"
          ></button>
        </section>
        <section class="cards page__section">
          <ul class="cards__list">
            <template id="card-template">
              <li class="card">
                <img
                  class="card__image"
                  src="https://practicum-content.s3.us-west-1.amazonaws.com/web-code/moved_yosemite.jpg"
                  alt="Vale de Yosemite"
                />
                <button
                  aria-label="Excluir cartão"
                  class="card__delete-button"
                  type="button"
                ></button>
                <div class="card__description">
                  <h2 class="card__title">Vale de Yosemite</h2>
                  <button
                    aria-label="Botão de curtir"
                    class="card__like-button"
                    type="button"
                  ></button>
                </div>
              </li>
            </template>
          </ul>
        </section>
      </main>
      <footer class="footer page__section">
        <p class="footer__copyright">© 2025 Around The U.S.</p>
      </footer>
      <div class="popup" id="edit-popup">
        <div class="popup__content">
          <button
            aria-label="Fechar pop-up"
            class="popup__close"
            type="button"
          ></button>
          <h3 class="popup__title">Editar perfil</h3>
          <form
            class="popup__form"
            id="edit-profile-form"
            name="editProfileForm"
          >
            <input
              class="popup__input popup__input_type_name"
              name="name"
              placeholder="Nome"
              type="text"
              minlength="2"
              maxlength="40"
              required
              id="name-input"
            />
            <span class="popup__input-error name-input-error"></span>
            <input
              class="popup__input popup__input_type_description"
              name="about"
              placeholder="Sobre mim"
              type="text"
              minlength="2"
              maxlength="200"
              required
              id="description-input"
            />
            <span class="popup__input-error description-input-error"></span>
            <button class="button popup__button" type="submit" disabled>
              Salvar
            </button>
          </form>
        </div>
      </div>
      <div class="popup" id="new-card-popup">
        <div class="popup__content">
          <button
            aria-label="Fechar pop-up"
            class="popup__close"
            type="button"
          ></button>
          <h3 class="popup__title">Novo local</h3>
          <form class="popup__form" id="new-card-form" name="newPlaceForm">
            <input
              class="popup__input popup__input_type_place-name"
              name="name"
              placeholder="Título"
              required
              type="text"
              minlength="2"
              maxlength="30"
              id="place-name-input"
            />
            <span class="popup__input-error place-name-input-error"></span>
            <input
              class="popup__input popup__input_type-link"
              name="link"
              placeholder="Link de Imagem"
              required
              type="url"
              id="place-link-input"
            />
            <span class="popup__input-error place-link-input-error"></span>
            <button class="button popup__button" type="submit" disabled>
              Criar
            </button>
          </form>
        </div>
      </div>
      <div class="popup" id="image-popup">
        <div class="popup__content popup__content_content_image">
          <button
            aria-label="Fechar pop-up"
            class="popup__close"
            type="button"
          ></button>
          <img alt="" class="popup__image" src="#" />
          <p class="popup__caption"></p>
        </div>
      </div>
      <div class="popup" id="confirmation-popup">
        <div class="popup__content">
          <button
            class="popup__close"
            aria-label="Fechar pop-up"
            type="button"
          ></button>
          <h3 class="popup__title">Tem certeza?</h3>
          <form class="popup__form" name="deleteCardForm">
            <button type="submit" class="button popup__button">Sim</button>
          </form>
        </div>
      </div>
      <div class="popup" id="update-avatar-popup">
        <div class="popup__content">
          <button
            class="popup__close"
            type="button"
            aria-label="Fechar pop-up"
          ></button>
          <h3 class="popup__title">Alterar a foto da perfil</h3>
          <form class="popup__form" name="updateAvatarForm">
            <input
              type="url"
              class="popup__input popup__input_type-link"
              name="avatar"
              placeholder="Link de Imagem de Perfil"
              required
              id="avatar-input"
            />
            <span class="popup__input-error avatar-input-error"></span>
            <button type="submit" class="popup__button button">Salvar</button>
          </form>
        </div>
      </div>
    </div>
    <script type="module" src="../scripts/pages/index.js"></script>
  </body>
</html>
